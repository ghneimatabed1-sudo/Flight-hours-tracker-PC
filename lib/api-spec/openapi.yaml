openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
        installProfile:
          type: string
          description: |
            Active install profile for this PC. One of `hub`, `aggregator-wing`,
            `aggregator-base`, `viewer`. Operators use this to verify what role
            a given install was configured with.
          enum:
            - hub
            - aggregator-wing
            - aggregator-base
            - viewer
        apiServerVersion:
          type: string
          description: |
            Semantic version of the running api-server build (read from
            `package.json` at build time and injected via esbuild). The
            dashboard compares this against its own bundled `__APP_VERSION__`
            so the operator gets a "please refresh" banner the moment the hub
            is upgraded out from under their cached HTML.
      required:
        - status

