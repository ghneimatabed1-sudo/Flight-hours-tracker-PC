kind = "web"
previewPath = "/"
title = "Pilot Hours Dashboard"
version = "1.0.0"
id = "artifacts/pilot-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25875

[services.development]
run = "pnpm --filter @workspace/pilot-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pilot-dashboard", "run", "build" ]
publicDir = "artifacts/pilot-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25875"
BASE_PATH = "/"
INTERNAL_API_PROXY_TARGET = "http://127.0.0.1:8080"
