name: Build Mobile (IPA + APK)

# Produces an unsigned IPA (simulator + iPhone device preview) and a
# signed APK for the RJAF Pilot Logbook via Expo Application Services.
#
# Requires repo secret EXPO_TOKEN (https://expo.dev/accounts/[you]/settings/access-tokens).
# The EAS project is created automatically on first run.
#
# Triggers:
#   - manual (workflow_dispatch) — pick profile (preview | production)
#   - push of a v* tag          — production builds
on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options: [preview, production]
  push:
    tags:
      - "v*"

jobs:
  eas-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/pilot-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Expo / EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile=false
        working-directory: .

      # APK (Android) + IPA (iOS simulator build is unsigned; device build
      # needs an Apple Developer cert — use the "production" profile for that).
      - name: Build Android APK
        run: eas build --platform android --profile ${{ inputs.profile || 'preview' }} --non-interactive --no-wait

      - name: Build iOS IPA
        run: eas build --platform ios --profile ${{ inputs.profile || 'preview' }} --non-interactive --no-wait
