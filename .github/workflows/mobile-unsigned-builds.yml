name: Hawk Eye — Unsigned Mobile Builds

on:
  workflow_dispatch:

env:
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # Android — unsigned APK (debug-signed, installs on any device)
  # ─────────────────────────────────────────────────────────────
  android-apk:
    name: Android APK (unsigned)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install pnpm
        run: npm install -g pnpm@9 --force

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile=false

      - name: Expo prebuild (android)
        working-directory: artifacts/pilot-mobile
        run: CI=true EXPO_NO_GIT_STATUS=1 pnpm exec expo prebuild --platform android --clean

      - name: Build release APK
        working-directory: artifacts/pilot-mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -x lint -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HawkEye-android
          path: artifacts/pilot-mobile/android/app/build/outputs/**/*.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # iOS — unsigned IPA (sideload via AltStore / Sideloadly)
  # ─────────────────────────────────────────────────────────────
  ios-ipa:
    name: iOS IPA (unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@9 --force

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile=false

      - name: Expo prebuild (ios)
        working-directory: artifacts/pilot-mobile
        run: CI=true EXPO_NO_GIT_STATUS=1 pnpm exec expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: artifacts/pilot-mobile/ios
        run: pod install

      - name: Build unsigned IPA
        working-directory: artifacts/pilot-mobile/ios
        run: |
          set -euo pipefail
          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: no .xcworkspace found in $(pwd). Listing:"; ls -la
            exit 1
          fi
          SCHEME="${WORKSPACE%.xcworkspace}"
          echo "Workspace: $WORKSPACE | Scheme: $SCHEME"
          BUILD_DIR="$GITHUB_WORKSPACE/build"
          mkdir -p "$BUILD_DIR"

          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$BUILD_DIR/PilotLogbook.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            archive

          APP_PATH=$(ls -d "$BUILD_DIR/PilotLogbook.xcarchive/Products/Applications/"*.app | head -1)
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: archive produced no .app bundle"
            ls -la "$BUILD_DIR/PilotLogbook.xcarchive/Products/Applications/" || true
            exit 1
          fi
          echo "App bundle: $APP_PATH"

          mkdir -p "$BUILD_DIR/Payload"
          cp -R "$APP_PATH" "$BUILD_DIR/Payload/"
          cd "$BUILD_DIR"
          zip -qr PilotLogbook-unsigned.ipa Payload

          IPA_SIZE=$(stat -f%z PilotLogbook-unsigned.ipa)
          echo "IPA size: $IPA_SIZE bytes"
          if [ "$IPA_SIZE" -lt 1000000 ]; then
            echo "ERROR: IPA is suspiciously small ($IPA_SIZE bytes)"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: HawkEye-ios-unsigned
          path: build/PilotLogbook-unsigned.ipa
          retention-days: 30
