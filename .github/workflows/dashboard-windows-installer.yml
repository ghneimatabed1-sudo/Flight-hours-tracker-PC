name: Build Windows Installer (RJAF Squadron Ops)

# Produces the NSIS .exe for the PC app and publishes it as a GitHub
# Release in the PUBLIC Flight-hours-tracker-Releases repo. The installed
# app polls that public repo for updates via electron-updater. Source code
# stays in this private repo; only compiled binaries are exposed.
#
# Triggers:
#   - manual (workflow_dispatch) — build + publish a release on demand
#   - push of a v* tag          — cut a release
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-exe:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: artifacts/pilot-dashboard
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Cache electron-builder's binary downloads (nsis, winCodeSign,
      # nsis-resources, electron zips, etc). Without this cache, every
      # run re-downloads ~120MB from GitHub release CDN; a transient 504
      # on any one of those downloads (as happened in run 24608487600)
      # fails the entire build. Cached entries skip the network entirely.
      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron-builder/Cache
            ~/AppData/Local/electron/Cache
          key: electron-builder-${{ runner.os }}-v32-nsis
          restore-keys: |
            electron-builder-${{ runner.os }}-

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile=false
        working-directory: .

      - name: Install Electron toolchain
        # electron + electron-builder are dev tooling. electron-updater MUST
        # be a regular dependency so electron-builder bundles it into the
        # asar — otherwise the installed app crashes with "Cannot find
        # module 'electron-updater'" at startup.
        run: |
          set -euo pipefail
          pnpm add -D electron@^32 electron-builder@^25
          pnpm add electron-updater@^6

      - name: Inject INSTALL_PASSWORD define into installer.nsh
        env:
          INSTALL_PASSWORD: ${{ secrets.INSTALL_PASSWORD || 'rjaf-install-change-me' }}
        run: |
          set -euo pipefail
          NSH=build/installer.nsh
          ORIGINAL=$(cat "$NSH")
          printf '!define INSTALL_PASSWORD "%s"\r\n%s' "$INSTALL_PASSWORD" "$ORIGINAL" > "$NSH"

      - name: Vite build (renderer)
        env:
          PORT: "5173"
          BASE_PATH: "./"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: pnpm run build

      - name: Verify renderer output exists
        run: |
          set -euo pipefail
          if [ ! -f dist/public/index.html ]; then
            echo "::error::dist/public/index.html missing — vite build did not produce a renderer bundle"
            exit 1
          fi
          echo "renderer ok: $(ls -la dist/public/index.html)"

      - name: Compile Electron main + preload
        run: pnpm run electron:compile

      - name: Build & publish Windows installer (with retry)
        env:
          INSTALL_PASSWORD: ${{ secrets.INSTALL_PASSWORD || 'rjaf-install-change-me' }}
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
        # Retry up to 3 times. electron-builder downloads several binaries
        # from the GitHub release CDN at build time; transient 5xx errors
        # there should not fail the whole pipeline. After the first
        # successful download, the cache step above keeps the file warm
        # for subsequent runs.
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "::group::electron-builder attempt $attempt"
            if pnpm exec electron-builder --win nsis --config electron-builder.json --publish always; then
              echo "::endgroup::"
              echo "build succeeded on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::electron-builder attempt $attempt failed; retrying in 20s"
            sleep 20
          done
          echo "::error::electron-builder failed after 3 attempts"
          exit 1

      - name: Upload installer (workflow artifact backup)
        uses: actions/upload-artifact@v4
        with:
          name: RJAF-SquadronOps-Installer
          path: artifacts/pilot-dashboard/release/*.exe
          if-no-files-found: error
