name: Build HawkEye-Setup.exe

# Compiles the Inno Setup installer for Hawk Eye (RJAF Squadron Ops).
# The resulting HawkEye-Setup.exe bundles the api-server, the React
# dashboard, a portable Node runtime, and portable pnpm — the installer
# needs nothing pre-installed on the target squadron PC except Windows.
#
# This is a LAN-only, air-gapped application. No Supabase or cloud
# services are referenced. No Supabase secrets are required.
#
# Triggers:
#   - push to main (any change to installer, api-server, or dashboard src)
#   - push of a v* tag  → also creates a GitHub Release
#   - manual dispatch   → also creates a GitHub Release
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-installer:
    name: Compile HawkEye-Setup.exe on Windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          choco install innosetup --yes --version=6.2.2 --no-progress
          # Confirm iscc is findable
          $iscc = Get-Command "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" -ErrorAction SilentlyContinue
          if ($null -eq $iscc) { $iscc = Get-Command iscc -ErrorAction SilentlyContinue }
          if ($null -eq $iscc) { throw "iscc.exe not found after choco install" }
          Write-Host "iscc found at: $($iscc.Source)"

      # Cache the portable Node + pnpm bundles that get embedded inside
      # the installer .exe so we don't re-download ~50 MB on every run.
      - name: Cache installer portable bundles
        uses: actions/cache@v4
        with:
          path: |
            installer/build-cache/node
            installer/build-cache/pnpm
          key: installer-bundles-node20.18.1-pnpm-latest-v1

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile
        shell: bash

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./artifacts/api-server/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Run installer build script
        shell: pwsh
        env:
          ISCC_PATH: "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"
        run: |
          Set-Location installer
          .\build.ps1 -IsccPath $env:ISCC_PATH -Verbose

      - name: Verify the .exe was produced
        shell: bash
        run: |
          if [ ! -f installer/dist/HawkEye-Setup.exe ]; then
            echo "::error::installer/dist/HawkEye-Setup.exe is missing after build"
            exit 1
          fi
          SIZE=$(du -sh installer/dist/HawkEye-Setup.exe | cut -f1)
          echo "HawkEye-Setup.exe built successfully — size: $SIZE"

      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash installer\dist\HawkEye-Setup.exe -Algorithm SHA256).Hash.ToLower()
          $line = "$hash  HawkEye-Setup.exe"
          $line | Out-File -Encoding ASCII installer\dist\HawkEye-Setup.exe.sha256
          Write-Host "SHA-256: $hash"

      # Always upload as a workflow artifact (downloadable from Actions tab
      # even on plain main-branch pushes that don't create a Release)
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: HawkEye-Setup-v${{ steps.version.outputs.version }}-${{ github.sha }}
          path: |
            installer/dist/HawkEye-Setup.exe
            installer/dist/HawkEye-Setup.exe.sha256
          if-no-files-found: error
          retention-days: 90

      # Create a GitHub Release on tag pushes or manual dispatches.
      # On plain main-branch pushes the .exe is still available as
      # a workflow artifact above — just not as a formal Release.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Hawk Eye v${{ steps.version.outputs.version }}"
          body: |
            ## Hawk Eye Squadron Ops — v${{ steps.version.outputs.version }}

            **LAN-only, air-gapped installer. No internet connection required on the target PC.**

            ### Install instructions
            1. Copy `HawkEye-Setup.exe` to the target Windows PC (USB stick is fine).
            2. Right-click → Run as administrator.
            3. Follow the wizard — choose your role (Hub / Wing aggregator / Base aggregator / Viewer).
            4. The installer bundles PostgreSQL, Node, and the dashboard — nothing to pre-install.

            ### Verify download integrity
            Compare the SHA-256 in `HawkEye-Setup.exe.sha256` against `certutil -hashfile HawkEye-Setup.exe SHA256`.

            ### What's in this release
            - Magic LAN auto-discovery: PCs sense each other on the same LAN and pair with one click.
            - Dashboard supervisor: launcher auto-restarts on crash.
            - Audit log captures every admin-triggered ops action.
            - Operator UX polish: unsaved-change warnings, backup progress, LAN-broadcast restart button.
            - All four roles tested (Hub / Wing / Base / Viewer).

            See `OPERATOR-RUNBOOK.md` and `installer/CODE-SIGNING-DECISION.md` in the repo for full details.
          files: |
            installer/dist/HawkEye-Setup.exe
            installer/dist/HawkEye-Setup.exe.sha256
          fail_on_unmatched_files: true
          generate_release_notes: false
          token: ${{ secrets.GITHUB_TOKEN }}
