name: Build HawkEye-Setup.exe

# Compiles the Inno Setup installer for Hawk Eye (RJAF Squadron Ops).
# LAN-only, air-gapped application — no Supabase or cloud secrets needed.
#
# Triggers:
#   - push to main
#   - push of a v* tag  → also creates a GitHub Release
#   - manual dispatch   → also creates a GitHub Release
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-installer:
    name: Compile HawkEye-Setup.exe on Windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          # choco is pre-installed on windows-latest and is the most reliable path.
          # No version pin — the latest Inno Setup 6.x is always compatible.
          choco install innosetup --yes --no-progress
          # Confirm iscc is accessible
          $paths = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )
          $found = $paths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $found) {
            # Also check PATH
            $found = (Get-Command iscc -ErrorAction SilentlyContinue)?.Source
          }
          if (-not $found) { throw "iscc.exe not found after choco install innosetup" }
          Write-Host "iscc found at: $found"
          # Make iscc available to subsequent steps via PATH
          $dir = Split-Path $found
          echo "$dir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Cache the portable Node + pnpm bundles embedded inside the installer .exe
      - name: Cache installer portable bundles
        uses: actions/cache@v4
        with:
          path: |
            installer/build-cache/node
            installer/build-cache/pnpm
          key: installer-bundles-node20.18.1-pnpm-latest-v2

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile
        shell: bash

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./artifacts/api-server/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Run installer build script
        shell: pwsh
        run: |
          Set-Location installer
          # iscc is now on PATH from the install step
          .\build.ps1 -Verbose

      - name: Verify the .exe was produced
        shell: bash
        run: |
          if [ ! -f installer/dist/HawkEye-Setup.exe ]; then
            echo "::error::installer/dist/HawkEye-Setup.exe is missing after build"
            exit 1
          fi
          SIZE=$(du -sh installer/dist/HawkEye-Setup.exe | cut -f1)
          echo "HawkEye-Setup.exe built successfully — size: $SIZE"

      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash installer\dist\HawkEye-Setup.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  HawkEye-Setup.exe" | Out-File -Encoding ASCII installer\dist\HawkEye-Setup.exe.sha256
          Write-Host "SHA-256: $hash"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: HawkEye-Setup-v${{ steps.version.outputs.version }}-${{ github.sha }}
          path: |
            installer/dist/HawkEye-Setup.exe
            installer/dist/HawkEye-Setup.exe.sha256
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Hawk Eye v${{ steps.version.outputs.version }}"
          body: |
            ## Hawk Eye Squadron Ops — v${{ steps.version.outputs.version }}

            **LAN-only, air-gapped installer. No internet required on the target PC.**

            ### Install
            1. Copy `HawkEye-Setup.exe` to the target Windows PC (USB stick is fine).
            2. Right-click → **Run as administrator**.
            3. Follow the wizard — choose your role (Hub / Wing / Base / Viewer).
            4. Everything installs automatically. No Node, no Postgres needed.

            ### Verify download integrity
            `certutil -hashfile HawkEye-Setup.exe SHA256` and compare to the `.sha256` file.

            ### What's in this release
            - Magic LAN auto-discovery: PCs sense each other and pair with one click.
            - Dashboard auto-restarts on crash (supervisor for all 3 services).
            - Audit log captures every admin-triggered ops action.
            - Operator UX polish: unsaved-change warnings, backup progress, restart-broadcast button.
          files: |
            installer/dist/HawkEye-Setup.exe
            installer/dist/HawkEye-Setup.exe.sha256
          fail_on_unmatched_files: true
          generate_release_notes: false
          token: ${{ secrets.GITHUB_TOKEN }}
