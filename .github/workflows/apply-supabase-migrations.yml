name: Apply Supabase migrations to production

# Auto-applies any new SQL files in
# artifacts/pilot-dashboard/supabase/migrations/ to the production
# Supabase project, recording each successful apply in the
# `_migration_ledger` table for idempotency.
#
# To recover after a partial failure, just re-run this workflow from
# the Actions tab — already-applied files are skipped.
#
# Required repository secret:
#   SUPABASE_ACCESS_TOKEN — a Supabase personal access token with
#                           database write access on the project ref
#                           below. Generate at
#                           https://supabase.com/dashboard/account/tokens

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/pilot-dashboard/supabase/migrations/**.sql'
      - '.github/workflows/apply-supabase-migrations.yml'
  workflow_dispatch:

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      PROJECT_REF: nklrdhfsbevckovqqkah
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      MIGRATIONS_DIR: artifacts/pilot-dashboard/supabase/migrations
    steps:
      - uses: actions/checkout@v4

      - name: Sanity-check secret
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN repo secret is not set."
            echo "::error::Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Apply pending migrations
        run: |
          set -euo pipefail

          api="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"
          auth_header="Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"

          # Helper: POST a query, return body on success, exit 1 on
          # non-2xx so partial failures stop the workflow loudly.
          run_query() {
            local q_payload="$1"
            local label="$2"
            local code
            code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST "$api" \
              -H "$auth_header" -H "Content-Type: application/json" \
              -d "$q_payload")
            if [ "$code" != "200" ] && [ "$code" != "201" ]; then
              echo "::error::$label failed (HTTP $code)"
              cat /tmp/resp.json
              exit 1
            fi
            cat /tmp/resp.json
          }

          # Step 1: does the ledger exist? If not, applied_set is empty
          # and the next migration that creates it will populate itself.
          ledger_resp=$(curl -sS -X POST "$api" \
            -H "$auth_header" -H "Content-Type: application/json" \
            -d '{"query":"select to_regclass('"'"'public._migration_ledger'"'"')::text as t"}')
          echo "ledger existence check: $ledger_resp"

          ledger_exists=$(node -e "
            try {
              const r = JSON.parse(process.argv[1]);
              const t = Array.isArray(r) && r[0] ? r[0].t : null;
              console.log(t ? 'yes' : 'no');
            } catch(e) { console.log('no'); }
          " "$ledger_resp")
          echo "ledger_exists=$ledger_exists"

          if [ "$ledger_exists" = "yes" ]; then
            applied_resp=$(run_query \
              '{"query":"select coalesce(json_agg(filename), '"'"'[]'"'"'::json) as f from public._migration_ledger"}' \
              "applied-list query")
            applied_set=$(node -e "
              const r = JSON.parse(process.argv[1]);
              const list = (Array.isArray(r) && r[0] && r[0].f) ? r[0].f : [];
              console.log(list.join('|'));
            " "$applied_resp")
          else
            applied_set=""
          fi

          shopt -s nullglob
          for f in $(ls "$MIGRATIONS_DIR"/*.sql | sort); do
            fn=$(basename "$f")
            if [ -n "$applied_set" ] && echo "|$applied_set|" | grep -q "|$fn|"; then
              echo "skip $fn (already applied)"
              continue
            fi
            echo "applying $fn"

            payload_file=$(mktemp)
            node -e "
              const fs = require('fs');
              process.stdout.write(JSON.stringify({ query: fs.readFileSync(process.argv[1], 'utf8') }));
            " "$f" > "$payload_file"

            http_code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST "$api" \
              -H "$auth_header" -H "Content-Type: application/json" \
              --data-binary @"$payload_file")

            if [ "$http_code" != "200" ] && [ "$http_code" != "201" ]; then
              echo "::error::FAILED applying $fn (HTTP $http_code)"
              cat /tmp/resp.json
              exit 1
            fi

            sha=$(sha256sum "$f" | awk '{print $1}')
            ledger_payload=$(node -e "
              const o = {
                query: \"insert into public._migration_ledger (filename, applied_by, sha256) values (\" +
                       \"'\" + process.argv[1] + \"', 'github-actions', '\" + process.argv[2] + \"') \" +
                       \"on conflict (filename) do update set sha256 = excluded.sha256, applied_at = now()\"
              };
              process.stdout.write(JSON.stringify(o));
            " "$fn" "$sha")
            run_query "$ledger_payload" "ledger insert for $fn" > /dev/null

            echo "✓ applied $fn"
          done
          echo "all migrations up to date."

      - name: Reload PostgREST schema cache
        run: |
          curl -sS -X POST "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query":"notify pgrst, '"'"'reload schema'"'"'"}'
          echo "schema cache reload signaled."

      # Task #180 — end-to-end regression for the cross-PC pair handshake.
      #
      # The migration in 0048 only re-checks the function source carries
      # `#variable_conflict use_column`; it does not actually call the
      # RPC. This step exercises xpc_redeem_pair_code (in_squadron,
      # sqn_to_wing, wing_to_base) and xpc_admin_create_pair against
      # the live database under a TEST_T171_-fenced namespace, and
      # fails the job if any scenario returns the wrong kind, leaks
      # state, or accepts a replayed code. The script auto-tears down
      # every TEST_T171_* row in finally{} so a partial failure cannot
      # litter prod with dangling test pairs.
      - name: Regression — cross-PC pair redemption (Task #171/180)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ env.PROJECT_REF }}
        run: node .local/scripts/regression-task-171-redeem-pair.mjs
