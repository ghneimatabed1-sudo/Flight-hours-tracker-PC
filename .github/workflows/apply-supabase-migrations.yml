name: Apply Supabase migrations to production

# Auto-applies any new SQL files in
# artifacts/pilot-dashboard/supabase/migrations/ to the production
# Supabase project, recording each successful apply in the
# `_migration_ledger` table for idempotency.
#
# To recover after a partial failure, just re-run this workflow from
# the Actions tab — already-applied files are skipped.
#
# Required repository secret:
#   SUPABASE_ACCESS_TOKEN — a Supabase personal access token with
#                           database write access on the project ref
#                           below. Generate at
#                           https://supabase.com/dashboard/account/tokens
#
# Optional repository secret (Task #192):
#   MIGRATION_ALERT_WEBHOOK_URL — incoming webhook for the operator's
#                                 alert channel. Both Slack and Discord
#                                 incoming-webhook URLs work as-is; the
#                                 notify step posts a payload carrying
#                                 both `text` (Slack) and `content`
#                                 (Discord) so either side picks it up
#                                 and the other ignores the extra key.
#                                 If the secret is unset, the notify
#                                 step degrades to a workflow warning
#                                 instead of failing the run.

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/pilot-dashboard/supabase/migrations/**.sql'
      - '.github/workflows/apply-supabase-migrations.yml'
  workflow_dispatch:

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      PROJECT_REF: nklrdhfsbevckovqqkah
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      MIGRATIONS_DIR: artifacts/pilot-dashboard/supabase/migrations
    steps:
      - uses: actions/checkout@v4

      # Task #249 — fail fast if a new migration introduces a duplicate
      # `NNNN_` numeric prefix. Two unrelated `0052_…` files in 2026-04
      # caused the live ledger to silently skip one of them; this guard
      # makes the apply job refuse to run until the collision is resolved.
      - name: Check migration prefix collisions
        id: prefix_guard
        run: node scripts/src/check-migration-prefixes.mjs

      - name: Sanity-check secret
        id: sanity
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN repo secret is not set."
            echo "::error::Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Apply pending migrations
        id: apply
        run: |
          set -euo pipefail

          api="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"
          auth_header="Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"

          # Helper: POST a query, return body on success, exit 1 on
          # non-2xx so partial failures stop the workflow loudly.
          run_query() {
            local q_payload="$1"
            local label="$2"
            local code
            code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST "$api" \
              -H "$auth_header" -H "Content-Type: application/json" \
              -d "$q_payload")
            if [ "$code" != "200" ] && [ "$code" != "201" ]; then
              echo "::error::$label failed (HTTP $code)"
              cat /tmp/resp.json
              exit 1
            fi
            cat /tmp/resp.json
          }

          # Step 1: does the ledger exist? If not, applied_set is empty
          # and the next migration that creates it will populate itself.
          ledger_resp=$(curl -sS -X POST "$api" \
            -H "$auth_header" -H "Content-Type: application/json" \
            -d '{"query":"select to_regclass('"'"'public._migration_ledger'"'"')::text as t"}')
          echo "ledger existence check: $ledger_resp"

          ledger_exists=$(node -e "
            try {
              const r = JSON.parse(process.argv[1]);
              const t = Array.isArray(r) && r[0] ? r[0].t : null;
              console.log(t ? 'yes' : 'no');
            } catch(e) { console.log('no'); }
          " "$ledger_resp")
          echo "ledger_exists=$ledger_exists"

          if [ "$ledger_exists" = "yes" ]; then
            applied_resp=$(run_query \
              '{"query":"select coalesce(json_agg(filename), '"'"'[]'"'"'::json) as f from public._migration_ledger"}' \
              "applied-list query")
            applied_set=$(node -e "
              const r = JSON.parse(process.argv[1]);
              const list = (Array.isArray(r) && r[0] && r[0].f) ? r[0].f : [];
              console.log(list.join('|'));
            " "$applied_resp")
          else
            applied_set=""
          fi

          shopt -s nullglob
          for f in $(ls "$MIGRATIONS_DIR"/*.sql | sort); do
            fn=$(basename "$f")
            # Compute the file's SHA-256 once, up front. We reuse it for
            # both the apply-time ledger insert (Task #145 / #195) AND
            # for the drift check on already-applied files below.
            sha=$(sha256sum "$f" | awk '{print $1}')
            if [ -z "$sha" ] || [ "${#sha}" != "64" ]; then
              echo "::error::Could not compute sha256 for $f (got '$sha')"
              exit 1
            fi

            if [ -n "$applied_set" ] && echo "|$applied_set|" | grep -q "|$fn|"; then
              echo "skip $fn (already applied; sha=${sha:0:12}…)"
              continue
            fi
            echo "applying $fn (sha=${sha:0:12}…)"

            payload_file=$(mktemp)
            node -e "
              const fs = require('fs');
              process.stdout.write(JSON.stringify({ query: fs.readFileSync(process.argv[1], 'utf8') }));
            " "$f" > "$payload_file"

            http_code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST "$api" \
              -H "$auth_header" -H "Content-Type: application/json" \
              --data-binary @"$payload_file")

            if [ "$http_code" != "200" ] && [ "$http_code" != "201" ]; then
              echo "::error::FAILED applying $fn (HTTP $http_code)"
              cat /tmp/resp.json
              exit 1
            fi

            # Insert / update the ledger row. The ON CONFLICT clause is
            # what catches migrations that include their own
            # self-insert with sha256=NULL (e.g. 0045_round4_fixes.sql,
            # 0050_squadron_rename_xpc_sync.sql) — without it those rows
            # would land in production with NULL sha and the drift
            # warning would never fire on them. See Task #195.
            ledger_payload=$(node -e "
              const o = {
                query: \"insert into public._migration_ledger (filename, applied_by, sha256) values (\" +
                       \"'\" + process.argv[1] + \"', 'github-actions', '\" + process.argv[2] + \"') \" +
                       \"on conflict (filename) do update set sha256 = excluded.sha256, applied_at = now(), applied_by = excluded.applied_by\"
              };
              process.stdout.write(JSON.stringify(o));
            " "$fn" "$sha")
            run_query "$ledger_payload" "ledger insert for $fn" > /dev/null

            # Verify the ledger now actually carries the right sha. This
            # is belt-and-suspenders against any future regression where
            # the on-conflict update silently fails to overwrite a NULL
            # (Task #195: the original Task #145 workflow shipped with
            # the ledger curl piped to /dev/null and 6 rows in
            # production ended up with sha=NULL forever).
            check_payload=$(node -e "
              const o = {
                query: \"select sha256 as s from public._migration_ledger where filename = '\" +
                       process.argv[1].replace(/'/g, \"''\") + \"'\"
              };
              process.stdout.write(JSON.stringify(o));
            " "$fn")
            check_resp=$(run_query "$check_payload" "ledger verify for $fn")
            recorded=$(node -e "
              try {
                const r = JSON.parse(process.argv[1]);
                console.log((Array.isArray(r) && r[0] && r[0].s) ? r[0].s : '');
              } catch(e) { console.log(''); }
            " "$check_resp")
            if [ "$recorded" != "$sha" ]; then
              echo "::error::Ledger sha for $fn did not persist (expected $sha, got '$recorded')."
              exit 1
            fi

            echo "✓ applied $fn"
          done
          echo "all migrations up to date."

          # Self-heal pass (Task #195): for any ledger row whose .sql
          # file we have on disk but whose sha256 is currently NULL,
          # backfill the disk hash. This catches:
          #
          #   • Pre-Task-#195 rows that the original (sha-blind) ledger
          #     curl never populated (the migration in
          #     0052_backfill_ledger_sha256.sql also covers these, but
          #     this pass lets us heal future occurrences without a new
          #     migration).
          #   • Any migration that self-inserts with sha=NULL and that
          #     somehow slipped past the on-conflict update above
          #     (e.g. a transient API failure on the verify step that
          #     somehow still passed; defence in depth).
          #
          # We only write when sha256 IS NULL so we never mask drift on
          # rows that already have a recorded hash to compare against.
          echo "self-heal: checking ledger for NULL sha rows…"
          for f in $(ls "$MIGRATIONS_DIR"/*.sql | sort); do
            fn=$(basename "$f")
            sha=$(sha256sum "$f" | awk '{print $1}')
            heal_payload=$(node -e "
              const o = {
                query: \"update public._migration_ledger set sha256 = '\" +
                       process.argv[2] + \"' where filename = '\" +
                       process.argv[1].replace(/'/g, \"''\") +
                       \"' and sha256 is null returning filename\"
              };
              process.stdout.write(JSON.stringify(o));
            " "$fn" "$sha")
            heal_resp=$(run_query "$heal_payload" "self-heal for $fn")
            healed=$(node -e "
              try {
                const r = JSON.parse(process.argv[1]);
                console.log(Array.isArray(r) ? r.length : 0);
              } catch(e) { console.log(0); }
            " "$heal_resp")
            if [ "$healed" != "0" ]; then
              echo "  healed $fn (was NULL, now ${sha:0:12}…)"
            fi
          done
          echo "self-heal complete."

      - name: Reload PostgREST schema cache
        id: reload
        run: |
          curl -sS -X POST "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query":"notify pgrst, '"'"'reload schema'"'"'"}'
          echo "schema cache reload signaled."

      # Task #252 — defect-class sweep for the 42702 ambiguous-column
      # bug fixed by 0046 + 0048. Enumerates every public.* SECURITY
      # DEFINER PL/pgSQL function whose RETURNS TABLE(...)/OUT-param
      # names collide with columns in any table the body INSERTs into,
      # and fails the job if any of those functions is missing
      # `#variable_conflict use_column`. The two known offenders
      # (xpc_admin_create_pair, xpc_redeem_pair_code) already carry
      # the directive, so this step's role is forward-looking: a future
      # migration that adds a new RPC matching the same shape can no
      # longer ship to prod undetected.
      #
      # The same enumeration also runs in pure SQL inside migration
      # 0055_assert_pair_code_out_collision_class.sql (which raises at
      # apply time). This Node step is defence-in-depth: it catches
      # vulnerable functions that landed in prod via a path OTHER than
      # the migration workflow (manual SQL, hot-fix, etc.).
      - name: Sweep — pair-code OUT/column collisions (Task #252)
        id: out_collision_sweep
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ env.PROJECT_REF }}
        # Run the offline parser self-test FIRST so a regression in the
        # `proargnames` / `proargmodes` array normalizer fails fast and
        # locally — without consuming the management API quota or
        # blaming a real prod problem on a parser bug. Only after the
        # parser passes do we run the live sweep against prod.
        run: |
          node scripts/src/check-pair-code-out-collisions.mjs --self-test
          node scripts/src/check-pair-code-out-collisions.mjs

      # Task #180 — end-to-end regression for the cross-PC pair handshake.
      #
      # The migration in 0048 only re-checks the function source carries
      # `#variable_conflict use_column`; it does not actually call the
      # RPC. This step exercises xpc_redeem_pair_code (in_squadron,
      # sqn_to_wing, wing_to_base) and xpc_admin_create_pair against
      # the live database under a TEST_T171_-fenced namespace, and
      # fails the job if any scenario returns the wrong kind, leaks
      # state, or accepts a replayed code. The script auto-tears down
      # every TEST_T171_* row in finally{} so a partial failure cannot
      # litter prod with dangling test pairs.
      - name: Regression — cross-PC pair redemption (Task #171/180)
        id: regression
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ env.PROJECT_REF }}
        run: node .local/scripts/regression-task-171-redeem-pair.mjs

      # Task #193 — companion regression for the two PAIR REVOKE RPCs.
      #
      # The redeem-pair script above only exercises the CREATE side
      # (xpc_redeem_pair_code × 3 kinds + xpc_admin_create_pair). The
      # two revoke surfaces — xpc_admin_revoke_pair (super-admin force)
      # and xpc_revoke_my_pair (participant withdrawal) — share the
      # same RLS / DEFINER risk class and need their own regression
      # gate so a future #variable_conflict-class defect or RLS
      # regression can't slip past the migrations job.
      #
      # Provisions a TEST_T171_-fenced universe (admin user, participant
      # user, stranger user, two PCs, one PC claim), exercises both
      # revoke RPCs end-to-end, asserts revoked_at + audit row both
      # times, AND probes the negative case (a non-owner stranger
      # calling xpc_revoke_my_pair must be denied with the ownership
      # error AND must not flip revoked_at). All TEST_T171_* rows are
      # purged in finally{} so a partial failure cannot litter prod.
      - name: Regression — pair revocation RPCs (Task #193)
        id: revoke_regression
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ env.PROJECT_REF }}
        run: node .local/scripts/regression-task-193-revoke-pair.mjs

      # Task #202 — regression for the squadron-rename cross-PC sync trigger.
      #
      # Migrations 0050 and 0052 install a single AFTER UPDATE trigger
      # on public.squadrons that propagates a name change into FIVE
      # denormalised tables (xpc_registry, xpc_pair_links, xpc_messages,
      # xpc_pending, xpc_schedule_shares). Without an automated test, a
      # future migration could silently miss one of the snapshot
      # columns — or accidentally widen the equality match so unrelated
      # rows get clobbered too — and nobody would notice until an
      # operator reported stale labels in the Connection Map / chat
      # history / Guest Officer inbox / Schedule Chain page.
      #
      # The script seeds two squadrons (one TARGET, one CONTROL) plus
      # one row per table per squadron, renames the TARGET squadron,
      # and asserts every TARGET snapshot column flipped to the new
      # name AND every CONTROL row was left untouched. The whole test
      # runs as a single DO block so a partial failure rolls back the
      # entire transaction and cannot litter prod.
      - name: Regression — squadron rename xpc sync (Task #202)
        id: rename_regression
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ env.PROJECT_REF }}
        run: node artifacts/pilot-dashboard/supabase/tests/test-squadron-rename-xpc-sync.mjs

      # Audit N (Task #262) — regression for the schedule-chain
      # submit-state-machine on xpc_schedule_shares.
      #
      # Migration 0056_schedchain_align_current_tier.sql widens the
      # CHECK on xpc_schedule_shares.current_tier so the canonical
      # initial state `submitted` (and every other lifecycle value
      # the sibling status_check already enumerates) inserts cleanly.
      # Audit G hit this constraint head-on and could not bootstrap a
      # cross-PC schedule share. Without this regression a future
      # tightening of the constraint would silently re-block the
      # legitimate happy path and the next audit would surface it the
      # same way Audit G did — as an unactionable CHECK failure deep
      # inside a multi-step driver.
      #
      # The script provisions an AUD_FIX_N_<run>-* universe (xpc_registry
      # rows, one schedule share), inserts the `current_tier='submitted'`
      # row, walks every lifecycle transition end-to-end, and tears
      # down every AUD_FIX_N_* row in finally{} (the test runs as a
      # single DO block so any failure rolls the whole transaction
      # back). A post-run probe also re-asserts no AUD_FIX_N_* rows
      # leaked into prod.
      - name: Regression — schedule chain submit walk (Task #262 / Audit N)
        id: schedchain_regression
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ env.PROJECT_REF }}
        run: node artifacts/pilot-dashboard/supabase/tests/test-schedchain-submit.mjs

      # Task #270 / #273 (wired in Round 4 AA4 / Task #281) — strict
      # scoped-SELECT regression for `xpc_squadron_snapshot`.
      #
      # Migration 0061_snapshot_rls_select_strict.sql removed the
      # permissive wing/base/HQ-tier fallback that Audit P proved was
      # silently leaking a multi-squadron commander's whole snapshot
      # set across squadron boundaries. Without a regression test
      # gating apply, the next migration that re-introduces a
      # "fail-open for legacy commanders" branch (and there will be
      # one — under-provisioned commanders' dashboards look broken
      # until the claim lands, so the temptation to fall back is
      # real) loses the scope-isolation contract again with no
      # signal.
      #
      # The script provisions three squadrons + one snapshot row each
      # + a fresh auth user, then drives SELECT through the
      # `authenticated` Postgres role under four distinct JWT
      # shapes (single PC claim, multi-squadron allow-list,
      # neither-claim-nor-allow-list, super_admin). All fixtures live
      # under a T270-<run>- prefix and the whole DO block runs in
      # Supabase's implicit transaction, so a failed assertion rolls
      # back without polluting prod.
      - name: Regression — snapshot RLS scoped SELECT (Task #270 / #273)
        id: snapshot_rls_regression
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ env.PROJECT_REF }}
        run: node artifacts/pilot-dashboard/supabase/tests/test-snapshot-rls-scoped-select.mjs

      # Round 4 AA3 (Task #281 sibling) drops three additional
      # in-tree regression tests that gate apply once they land:
      #
      #   * test-xpc-pending-rls.mjs       — Audit P defect P-3 (the
      #     `xpc_pending` SELECT policy compared squadron-id columns
      #     against `xpc_my_pc_ids()`, a PC-id namespace mismatch
      #     that reduced every commander's pending-guest list to
      #     zero rows).
      #   * test-schema-drift-restored.mjs — schema-drift fixes
      #     (audit_log.action column + reminder_schedules table) so
      #     a future migration that drops one of them fails apply.
      #   * test-snapshot-payload-hours.mjs — #268 commander rollup
      #     hours surfaced through the snapshot payload (without
      #     this test, a publisher regression would silently
      #     re-zero every commander's per-pilot hours).
      #
      # Each step uses `if: hashFiles(...)` so the apply workflow
      # remains green during the brief window where AA4 has merged
      # but AA3 has not yet — the moment AA3 lands the file under
      # the path below, the corresponding step starts running and
      # gating apply. AA-Z removes the hashFiles guard once all
      # three are in tree.
      - name: Regression — xpc_pending commander RLS (Round 4 AA3)
        id: xpc_pending_regression
        if: ${{ hashFiles('artifacts/pilot-dashboard/supabase/tests/test-xpc-pending-rls.mjs') != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ env.PROJECT_REF }}
        run: node artifacts/pilot-dashboard/supabase/tests/test-xpc-pending-rls.mjs

      - name: Regression — schema drift restored (Round 4 AA3)
        id: schema_drift_regression
        if: ${{ hashFiles('artifacts/pilot-dashboard/supabase/tests/test-schema-drift-restored.mjs') != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ env.PROJECT_REF }}
        run: node artifacts/pilot-dashboard/supabase/tests/test-schema-drift-restored.mjs

      - name: Regression — snapshot payload hours (Round 4 AA3 / #268)
        id: snapshot_payload_hours_regression
        if: ${{ hashFiles('artifacts/pilot-dashboard/supabase/tests/test-snapshot-payload-hours.mjs') != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ env.PROJECT_REF }}
        run: node artifacts/pilot-dashboard/supabase/tests/test-snapshot-payload-hours.mjs

      # Round 4 AA4 (Task #281) — audit-evidence mirror guard.
      #
      # Enforces the convention documented in
      # `audit-evidence/README.md`: every commit whose message
      # contains `audit-NNNN-MM-DD` must also touch
      # `audit-evidence/NNNN-MM-DD/`. The guard runs in --mode
      # warning for the first cycle (one CI pass after AA-Z lands
      # all sibling reports, no spurious failures) and is promoted
      # to --mode blocker afterwards.
      #
      # The guard scans only the most recent commit by default —
      # cheap, no-network, no Supabase calls — so it adds <1s to
      # apply runs.
      - name: Audit-evidence mirror guard (Round 4 AA4 / Task #281)
        id: evidence_mirror_guard
        # never block the apply itself in warning mode; promote later
        continue-on-error: true
        run: node scripts/src/check-audit-evidence-mirror.mjs --mode warning --commits 1

      # Task #192 — fast-path operator alert for ordinary step failures.
      #
      # This step is the in-job notifier: it fires within seconds when
      # any earlier step ends in failure, cancelled, or timed_out. It
      # is intentionally NOT the only safety net — GitHub may stop
      # in-job steps from running when the whole workflow is cancelled
      # or hits a run-level timeout, so a separate workflow_run-
      # triggered alert in `migration-completion-alert.yml` posts the
      # authoritative message after the run finishes (covering run-
      # level cancellations and timeouts the always() guard cannot
      # reach). The two alerts are tagged "(in-job)" vs "(post-run)"
      # so the on-call operator can recognise a duplicate as the same
      # incident rather than two separate failures.
      #
      # The failing-step lookup walks the step IDs in execution order
      # and reports the first one whose conclusion is not 'success'
      # or 'skipped'; that matches GitHub's own "first failure stops
      # the job" semantics so the operator sees the real culprit, not
      # a downstream cascade.
      - name: Notify operators on failure
        if: ${{ always() && !success() }}
        env:
          WEBHOOK_URL: ${{ secrets.MIGRATION_ALERT_WEBHOOK_URL }}
          PREFIX_GUARD_OUTCOME: ${{ steps.prefix_guard.conclusion }}
          SANITY_OUTCOME: ${{ steps.sanity.conclusion }}
          APPLY_OUTCOME: ${{ steps.apply.conclusion }}
          RELOAD_OUTCOME: ${{ steps.reload.conclusion }}
          OUT_COLLISION_SWEEP_OUTCOME: ${{ steps.out_collision_sweep.conclusion }}
          REGRESSION_OUTCOME: ${{ steps.regression.conclusion }}
          REVOKE_REGRESSION_OUTCOME: ${{ steps.revoke_regression.conclusion }}
          RENAME_REGRESSION_OUTCOME: ${{ steps.rename_regression.conclusion }}
          SCHEDCHAIN_REGRESSION_OUTCOME: ${{ steps.schedchain_regression.conclusion }}
          SNAPSHOT_RLS_REGRESSION_OUTCOME: ${{ steps.snapshot_rls_regression.conclusion }}
          XPC_PENDING_REGRESSION_OUTCOME: ${{ steps.xpc_pending_regression.conclusion }}
          SCHEMA_DRIFT_REGRESSION_OUTCOME: ${{ steps.schema_drift_regression.conclusion }}
          SNAPSHOT_PAYLOAD_HOURS_REGRESSION_OUTCOME: ${{ steps.snapshot_payload_hours_regression.conclusion }}
          EVIDENCE_MIRROR_GUARD_OUTCOME: ${{ steps.evidence_mirror_guard.conclusion }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -u

          if [ -z "${WEBHOOK_URL:-}" ]; then
            echo "::warning::MIGRATION_ALERT_WEBHOOK_URL secret is not set; skipping operator notification."
            echo "::warning::Add it under Settings → Secrets and variables → Actions to enable Slack/Discord alerts."
            exit 0
          fi

          # Walk steps in execution order and report the first one that
          # didn't succeed. Empty/skipped IDs (e.g. checkout, which has
          # no id) are intentionally not in the list — they don't run
          # any project code and aren't useful to surface. We treat
          # failure, cancelled, and timed_out as actionable — that
          # matches every non-success terminal step conclusion GitHub
          # produces today.
          failing_step="unknown step"
          for pair in \
            "Check migration prefix collisions|${PREFIX_GUARD_OUTCOME:-}" \
            "Sanity-check secret|${SANITY_OUTCOME:-}" \
            "Apply pending migrations|${APPLY_OUTCOME:-}" \
            "Reload PostgREST schema cache|${RELOAD_OUTCOME:-}" \
            "Sweep — pair-code OUT/column collisions|${OUT_COLLISION_SWEEP_OUTCOME:-}" \
            "Regression — cross-PC pair redemption|${REGRESSION_OUTCOME:-}" \
            "Regression — pair revocation RPCs|${REVOKE_REGRESSION_OUTCOME:-}" \
            "Regression — squadron rename xpc sync|${RENAME_REGRESSION_OUTCOME:-}" \
            "Regression — schedule chain submit walk|${SCHEDCHAIN_REGRESSION_OUTCOME:-}" \
            "Regression — snapshot RLS scoped SELECT|${SNAPSHOT_RLS_REGRESSION_OUTCOME:-}" \
            "Regression — xpc_pending commander RLS|${XPC_PENDING_REGRESSION_OUTCOME:-}" \
            "Regression — schema drift restored|${SCHEMA_DRIFT_REGRESSION_OUTCOME:-}" \
            "Regression — snapshot payload hours|${SNAPSHOT_PAYLOAD_HOURS_REGRESSION_OUTCOME:-}" \
            "Audit-evidence mirror guard|${EVIDENCE_MIRROR_GUARD_OUTCOME:-}"
          do
            name="${pair%%|*}"
            outcome="${pair##*|}"
            case "$outcome" in
              failure|cancelled|timed_out)
                failing_step="$name"
                break
                ;;
            esac
          done

          short_sha="${COMMIT_SHA:0:7}"
          text=$(printf ':rotating_light: Apply Supabase migrations — %s (in-job)\nRepo: %s\nFailing step: %s\nSHA: %s\nRun: %s' \
            "$JOB_STATUS" "$REPO" "$failing_step" "$short_sha" "$RUN_URL")

          # Slack incoming-webhooks read the `text` key; Discord
          # incoming-webhooks read `content`. Sending both means a
          # single secret value works for either platform without
          # branching on URL shape.
          payload=$(node -e '
            const text = process.argv[1];
            process.stdout.write(JSON.stringify({ text, content: text }));
          ' "$text")

          http_code=$(curl -sS -o /tmp/notify-resp.txt -w "%{http_code}" \
            -X POST -H "Content-Type: application/json" \
            -d "$payload" "$WEBHOOK_URL")

          if [ "$http_code" != "200" ] && [ "$http_code" != "204" ]; then
            echo "::warning::Operator notification webhook returned HTTP $http_code"
            cat /tmp/notify-resp.txt || true
            # Don't fail the job for a notification delivery problem —
            # the underlying migration/regression failure is what the
            # operator needs to act on, and masking it with a notify
            # error would hurt triage.
            exit 0
          fi

          echo "operator notification posted (HTTP $http_code)."
