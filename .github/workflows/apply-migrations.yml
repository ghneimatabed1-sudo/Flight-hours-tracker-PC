name: Apply Supabase Migrations

# Why this exists
# ─────────────────
# Task #145 / two-week burn-in revealed a recurring failure:
# new SQL migrations would land on `main` but never reach the production
# Supabase project, because the only "deploy" path was a human pasting
# files into the Supabase SQL editor. This workflow closes that gap.
#
# What it does
# ─────────────
# On every push to main that touches `artifacts/pilot-dashboard/supabase/migrations/`
# (and on manual dispatch), this job:
#   1. Lists every `.sql` file in that folder, sorted lexically.
#   2. Reads `public._migration_ledger` from production.
#   3. For each file NOT in the ledger, applies it via the Supabase
#      Management API and inserts a ledger row recording filename,
#      sha256, applied_by='github-actions', applied_at=now().
#   4. For each file already in the ledger, compares the on-disk sha256
#      with the recorded one. A mismatch fails the job — it means a
#      migration was edited after being applied, which is a drift bug
#      that needs a human decision (write a new migration, don't
#      retroactively rewrite history).
#
# Required repository secrets
# ───────────────────────────
#   SUPABASE_PROJECT_REF       e.g. nklrdhfsbevckovqqkah
#   SUPABASE_ACCESS_TOKEN      a personal-access-token with
#                              "Read & write database" scope
#
# Failure modes & recovery
# ────────────────────────
#   * 4xx from Management API → migration SQL is invalid; fix the file,
#     push again. The failed file is NOT recorded in the ledger so the
#     next run will retry it.
#   * sha256 mismatch         → an already-applied migration was edited.
#     The job fails fast with the offending filename. Do NOT delete the
#     ledger row; instead, write a forward-only patch migration.
#   * Ledger missing          → on first run, the workflow expects
#     migration 0044_migration_ledger.sql to have been applied
#     manually so the ledger table exists. After that, this workflow
#     is the source of truth.

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/pilot-dashboard/supabase/migrations/**.sql'
      - '.github/workflows/apply-migrations.yml'
  workflow_dispatch:

concurrency:
  # Never run two apply jobs at once: ledger writes must be serialized.
  group: apply-migrations
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Task #249 — fail fast if a new migration introduces a duplicate
      # `NNNN_` numeric prefix. Two unrelated `0052_…` files in 2026-04
      # caused the live ledger to silently skip one of them; this guard
      # makes the apply job refuse to run until the collision is resolved.
      - name: Check migration prefix collisions
        run: node scripts/src/check-migration-prefixes.mjs

      - name: Apply pending migrations
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          node --input-type=commonjs <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');

          const ref = process.env.SUPABASE_PROJECT_REF;
          const token = process.env.SUPABASE_ACCESS_TOKEN;
          if (!ref || !token) {
            console.error('Missing SUPABASE_PROJECT_REF or SUPABASE_ACCESS_TOKEN');
            process.exit(2);
          }

          async function q(sql) {
            const r = await fetch(
              `https://api.supabase.com/v1/projects/${ref}/database/query`,
              {
                method: 'POST',
                headers: {
                  Authorization: `Bearer ${token}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ query: sql }),
              }
            );
            const text = await r.text();
            if (!r.ok) {
              throw new Error(`HTTP ${r.status}: ${text.slice(0, 1500)}`);
            }
            return JSON.parse(text);
          }

          function sha(s) {
            return crypto.createHash('sha256').update(s).digest('hex');
          }

          // Pull current ledger.
          const ledgerRows = await q(
            "select filename, sha256 from public._migration_ledger"
          );
          const ledger = new Map(ledgerRows.map(r => [r.filename, r.sha256]));

          // Enumerate on-disk migrations.
          const dir = 'artifacts/pilot-dashboard/supabase/migrations';
          const files = fs.readdirSync(dir).filter(f => f.endsWith('.sql')).sort();

          let applied = 0;
          let drift = [];

          for (const f of files) {
            const body = fs.readFileSync(path.join(dir, f), 'utf8');
            const h = sha(body);
            if (ledger.has(f)) {
              const known = ledger.get(f);
              if (known && known !== h) {
                drift.push(`${f}: ledger=${known.slice(0, 12)} disk=${h.slice(0, 12)}`);
              }
              continue;
            }
            console.log(`Applying ${f} (${body.length} bytes, sha=${h.slice(0, 12)})`);
            await q(body);
            // Record in ledger using a parameter-safe escape.
            const safeSql = body.replace(/'/g, "''"); // unused; ledger insert below
            await q(
              `insert into public._migration_ledger (filename, applied_at, applied_by, sha256)
               values ('${f.replace(/'/g, "''")}', now(), 'github-actions', '${h}')
               on conflict (filename) do update
                 set sha256 = excluded.sha256,
                     applied_at = excluded.applied_at,
                     applied_by = excluded.applied_by`
            );
            applied += 1;
          }

          console.log(`\nApplied ${applied} new migration(s).`);
          if (drift.length) {
            console.error('\nDRIFT — these files were edited after being applied:');
            for (const d of drift) console.error('  ' + d);
            console.error(
              '\nWrite a new forward-only migration to re-align production.'
            );
            process.exit(1);
          }
          NODE
