name: Promote pre-release to Latest

# Manually flips a pre-release in Flight-hours-tracker-Releases into a
# real "Latest" release, which is what triggers electron-updater on every
# installed Hawk Eye PC to download and install the new version.
#
# Trigger this from the Actions tab. Inputs:
#   - tag: the release tag to promote, e.g. "v1.0.53". Defaults to the
#     newest pre-release in the repo if left blank.
#
# This is the only step needed to push a tested build out to all pilots.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to promote (e.g. v1.0.53). Leave blank to promote the latest pre-release."
        required: false
        default: ""

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve and promote release
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          OWNER: ghneimatabed1-sudo
          REPO: Flight-hours-tracker-Releases
        run: |
          set -euo pipefail
          api() {
            curl -sS -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" "$@"
          }

          TAG="${INPUT_TAG:-}"
          if [ -z "$TAG" ]; then
            echo "No tag supplied — finding newest pre-release…"
            TAG=$(api "https://api.github.com/repos/$OWNER/$REPO/releases?per_page=20" \
              | python3 -c "import json,sys; rs=[r for r in json.load(sys.stdin) if r.get('prerelease')]; print(rs[0]['tag_name'] if rs else '')")
            if [ -z "$TAG" ]; then
              echo "::error::No pre-releases found in $OWNER/$REPO."
              exit 1
            fi
            echo "Newest pre-release: $TAG"
          fi

          echo "Looking up release $TAG…"
          REL_JSON=$(api "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG")
          REL_ID=$(printf '%s' "$REL_JSON" | python3 -c "import json,sys;print(json.load(sys.stdin).get('id') or '')")
          if [ -z "$REL_ID" ]; then
            echo "::error::Release $TAG not found in $OWNER/$REPO."
            exit 1
          fi

          # Verify the install + manifest assets are attached. Without
          # latest.yml, electron-updater on installed PCs will not see
          # this release at all.
          ASSETS=$(printf '%s' "$REL_JSON" | python3 -c "import json,sys;print('\n'.join(a['name'] for a in json.load(sys.stdin).get('assets',[])))")
          echo "Assets attached:"
          printf '  %s\n' $ASSETS
          if ! printf '%s' "$ASSETS" | grep -q '^latest.yml$'; then
            echo "::error::latest.yml is not attached to $TAG. Auto-update will not work. Aborting."
            exit 1
          fi
          if ! printf '%s' "$ASSETS" | grep -q '^HawkEye-Setup-.*\.exe$'; then
            echo "::error::No HawkEye-Setup-*.exe attached to $TAG. Aborting."
            exit 1
          fi

          echo "Flipping $TAG → Latest…"
          api -X PATCH "https://api.github.com/repos/$OWNER/$REPO/releases/$REL_ID" \
            -d '{"prerelease": false, "make_latest": "true", "draft": false}' \
            | python3 -c "import json,sys; r=json.load(sys.stdin); print('OK -', r['html_url'], '- prerelease=', r.get('prerelease'))"

          echo ""
          echo "::notice::$TAG is now the Latest release. Every installed Hawk Eye will pick it up on next startup (or when the user clicks Check for updates)."
