name: E2E — multi-squadron commander provisioning (Task #275 / #281)

# Round-4 AA4 closes the missing e2e coverage Audit P (and predecessor
# task #275) flagged for the wing-tier commander flow. The spec lives
# at artifacts/pilot-dashboard/e2e/commander-provisioning.spec.ts and
# walks all eight provisioning steps end-to-end against a real
# Supabase universe.
#
# Trigger surfaces
# ────────────────
# This workflow runs on every PR (and direct push to main) that touches
# the four production paths the spec exercises. A PR that only edits
# unrelated files does not trigger it — Playwright runs are slow and
# we don't want to gate every cosmetic change behind them.
#
# Required repository secrets (CI only — local runs read the same
# names from the developer's shell)
# ─────────────────────────────────────────────────────────────────
#   E2E_DASHBOARD_URL           — fully-qualified URL of the dashboard
#                                 that the spec should drive (e.g. the
#                                 staging deployment). REQUIRED.
#   E2E_SUPER_ADMIN_USERNAME    — super_admin local-account username
#                                 (defaults to "admin" — the canonical
#                                 super-admin name on every install).
#                                 OPTIONAL.
#   E2E_SUPER_ADMIN_PASSWORD    — super_admin password. REQUIRED.
#   E2E_SUPER_ADMIN_TOTP_SECRET — base32 TOTP secret seeded at the
#                                 same time the super_admin row was
#                                 provisioned. REQUIRED.
#
# When any required secret is unset the spec marks itself skipped
# (NOT failed) — see the test.skip() at the top of the spec file. So
# a workflow run on a fork (or before secrets land in repo settings)
# reports green-with-skips rather than failing. Once secrets ARE
# configured any spec failure correctly fails the workflow — there
# is no `continue-on-error` knob masking real regressions.

on:
  pull_request:
    paths:
      - 'artifacts/pilot-dashboard/supabase/functions/provision-commander/**'
      - 'artifacts/pilot-dashboard/supabase/functions/register-license/**'
      - 'artifacts/pilot-dashboard/supabase/functions/heal-claims/**'
      - 'artifacts/pilot-dashboard/src/pages/admin/LicenseKeys.tsx'
      - 'artifacts/pilot-dashboard/e2e/**'
      - 'artifacts/pilot-dashboard/playwright.config.ts'
      - '.github/workflows/e2e-commander-provisioning.yml'
  push:
    branches: [main]
    paths:
      - 'artifacts/pilot-dashboard/supabase/functions/provision-commander/**'
      - 'artifacts/pilot-dashboard/supabase/functions/register-license/**'
      - 'artifacts/pilot-dashboard/supabase/functions/heal-claims/**'
      - 'artifacts/pilot-dashboard/src/pages/admin/LicenseKeys.tsx'
      - 'artifacts/pilot-dashboard/e2e/**'
      - 'artifacts/pilot-dashboard/playwright.config.ts'
      - '.github/workflows/e2e-commander-provisioning.yml'
  workflow_dispatch:

concurrency:
  # Serialise provisioning runs against the shared staging universe so
  # two PRs landing simultaneously don't try to revoke each other's
  # test commander rows in parallel.
  group: e2e-commander-provisioning
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      E2E_DASHBOARD_URL: ${{ secrets.E2E_DASHBOARD_URL }}
      E2E_SUPER_ADMIN_USERNAME: ${{ secrets.E2E_SUPER_ADMIN_USERNAME }}
      E2E_SUPER_ADMIN_PASSWORD: ${{ secrets.E2E_SUPER_ADMIN_PASSWORD }}
      E2E_SUPER_ADMIN_TOTP_SECRET: ${{ secrets.E2E_SUPER_ADMIN_TOTP_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @workspace/pilot-dashboard exec playwright install --with-deps chromium

      - name: Run commander provisioning e2e
        # The spec self-skips when any of the four E2E_* secrets is
        # missing — see the test.skip() at the top of the spec file.
        # Once the secrets ARE configured, any spec failure correctly
        # fails this workflow (no continue-on-error knob).
        run: pnpm --filter @workspace/pilot-dashboard exec playwright test --reporter=list,html

      - name: Upload Playwright HTML report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: artifacts/pilot-dashboard/playwright-report
          if-no-files-found: ignore
          retention-days: 30
