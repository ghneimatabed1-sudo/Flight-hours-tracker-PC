workflows:
  # ──────────────────────────────────────────────────────────────────────
  # Android APK — RJAF Pilot Logbook (unsigned preview build)
  #
  # Produces a debug-signed APK you can hand to pilots on any Android
  # phone without an Play Store account. Uses `expo prebuild` so the
  # native android/ folder is generated at build time from app.json.
  # ──────────────────────────────────────────────────────────────────────
  android-apk:
    name: RJAF Pilot Logbook — Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
      vars:
        PACKAGE_NAME: "com.rjaf.pilotlogbook"
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm@9
      - name: Install workspace deps
        script: |
          pnpm install --frozen-lockfile=false
      - name: Expo prebuild (android)
        script: |
          cd artifacts/pilot-mobile
          pnpm dlx expo prebuild --platform android --clean --non-interactive
      - name: Build debug APK
        script: |
          cd artifacts/pilot-mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease -x lint -x test
    artifacts:
      - artifacts/pilot-mobile/android/app/build/outputs/**/*.apk

  # ──────────────────────────────────────────────────────────────────────
  # iOS IPA — RJAF Pilot Logbook (unsigned / ad-hoc)
  #
  # Builds an .ipa you can side-load via AltStore / Sideloadly on any
  # iPhone without a paid Apple Developer account. Flip to
  # `app-store` distribution later by adding an ios_signing block and
  # code-signing credentials in the Codemagic UI.
  # ──────────────────────────────────────────────────────────────────────
  ios-ipa:
    name: RJAF Pilot Logbook — iOS IPA
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.rjaf.pilotlogbook"
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm@9
      - name: Install workspace deps
        script: |
          pnpm install --frozen-lockfile=false
      - name: Expo prebuild (ios)
        script: |
          cd artifacts/pilot-mobile
          pnpm dlx expo prebuild --platform ios --clean --non-interactive
      - name: Install pods
        script: |
          cd artifacts/pilot-mobile/ios
          pod install
      - name: Build unsigned IPA (ad-hoc)
        script: |
          cd artifacts/pilot-mobile/ios
          SCHEME=$(ls *.xcworkspace | head -1 | sed 's/.xcworkspace//')
          xcodebuild -workspace "$SCHEME.xcworkspace" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $CM_BUILD_DIR/build/PilotLogbook.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive
          # Repackage .xcarchive -> .ipa without re-signing
          mkdir -p $CM_BUILD_DIR/build/Payload
          cp -R $CM_BUILD_DIR/build/PilotLogbook.xcarchive/Products/Applications/*.app \
                $CM_BUILD_DIR/build/Payload/
          cd $CM_BUILD_DIR/build
          zip -qr PilotLogbook-unsigned.ipa Payload
    artifacts:
      - build/*.ipa
      - build/**/*.xcarchive

  # ──────────────────────────────────────────────────────────────────────
  # Windows EXE — RJAF Squadron Ops installer (Electron + NSIS)
  #
  # Produces the one-click NSIS installer ops officers run on the
  # squadron PC. INSTALL_PASSWORD can be set per-build in the Codemagic
  # UI; if omitted, a placeholder is used for sanity testing.
  # ──────────────────────────────────────────────────────────────────────
  windows-exe:
    name: RJAF Squadron Ops — Windows Installer
    max_build_duration: 60
    instance_type: windows_x2
    environment:
      node: 20
      vars:
        INSTALL_PASSWORD: "rjaf-install-change-me"
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm@9
      - name: Install workspace deps
        script: |
          pnpm install --frozen-lockfile=false
      - name: Install Electron toolchain
        script: |
          cd artifacts/pilot-dashboard
          pnpm add -D electron@^32 electron-builder@^25 electron-updater@^6
      - name: Build Windows installer
        script: |
          cd artifacts/pilot-dashboard
          pnpm run electron:build
    artifacts:
      - artifacts/pilot-dashboard/release/*.exe
      - artifacts/pilot-dashboard/release/latest.yml
