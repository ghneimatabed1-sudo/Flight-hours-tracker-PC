workflows:
  # ──────────────────────────────────────────────────────────────────────
  # Android APK — RJAF Pilot Logbook (unsigned preview build)
  #
  # Produces a debug-signed APK you can hand to pilots on any Android
  # phone without an Play Store account. Uses `expo prebuild` so the
  # native android/ folder is generated at build time from app.json.
  # ──────────────────────────────────────────────────────────────────────
  android-apk:
    name: RJAF Pilot Logbook — Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
      vars:
        PACKAGE_NAME: "com.rjaf.pilotlogbook"
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm@9 --force
      - name: Install workspace deps
        script: |
          pnpm install --frozen-lockfile=false
      - name: Expo prebuild (android)
        script: |
          cd artifacts/pilot-mobile
          CI=true EXPO_NO_GIT_STATUS=1 pnpm exec expo prebuild --platform android --clean
      - name: Build debug APK
        script: |
          cd artifacts/pilot-mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease -x lint -x test
    artifacts:
      - artifacts/pilot-mobile/android/app/build/outputs/**/*.apk

  # ──────────────────────────────────────────────────────────────────────
  # iOS IPA — RJAF Pilot Logbook (unsigned / ad-hoc)
  #
  # Builds an .ipa you can side-load via AltStore / Sideloadly on any
  # iPhone without a paid Apple Developer account. Flip to
  # `app-store` distribution later by adding an ios_signing block and
  # code-signing credentials in the Codemagic UI.
  # ──────────────────────────────────────────────────────────────────────
  ios-ipa:
    name: RJAF Pilot Logbook — iOS IPA
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.rjaf.pilotlogbook"
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm@9 --force
      - name: Install workspace deps
        script: |
          pnpm install --frozen-lockfile=false
      - name: Expo prebuild (ios)
        script: |
          cd artifacts/pilot-mobile
          CI=true EXPO_NO_GIT_STATUS=1 pnpm exec expo prebuild --platform ios --clean
      - name: Install pods
        script: |
          cd artifacts/pilot-mobile/ios
          pod install
      - name: Build unsigned IPA (ad-hoc)
        script: |
          set -euo pipefail
          cd artifacts/pilot-mobile/ios
          # `.xcworkspace` is a directory bundle, so `ls *.xcworkspace`
          # would list its contents. Use `-d` to list the directory itself.
          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: no .xcworkspace found in $(pwd). Listing:"; ls -la
            exit 1
          fi
          SCHEME="${WORKSPACE%.xcworkspace}"
          echo "Workspace: $WORKSPACE | Scheme: $SCHEME"
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/build/PilotLogbook.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            archive
          # Verify the .app was produced before packaging
          APP_PATH=$(ls -d "$CM_BUILD_DIR/build/PilotLogbook.xcarchive/Products/Applications/"*.app | head -1)
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: archive produced no .app bundle"
            ls -la "$CM_BUILD_DIR/build/PilotLogbook.xcarchive/Products/Applications/" || true
            exit 1
          fi
          echo "App bundle: $APP_PATH"
          # Repackage .xcarchive -> .ipa without re-signing
          mkdir -p "$CM_BUILD_DIR/build/Payload"
          cp -R "$APP_PATH" "$CM_BUILD_DIR/build/Payload/"
          cd "$CM_BUILD_DIR/build"
          zip -qr PilotLogbook-unsigned.ipa Payload
          IPA_SIZE=$(stat -f%z PilotLogbook-unsigned.ipa)
          echo "IPA size: $IPA_SIZE bytes"
          if [ "$IPA_SIZE" -lt 1000000 ]; then
            echo "ERROR: IPA is suspiciously small ($IPA_SIZE bytes) — failing build"
            exit 1
          fi
    artifacts:
      - build/*.ipa
      - build/**/*.xcarchive

  # NOTE: Windows EXE build runs on GitHub Actions instead of Codemagic
  # because Codemagic's Windows runners require a paid plan. See
  # `.github/workflows/dashboard-windows-installer.yml`.
